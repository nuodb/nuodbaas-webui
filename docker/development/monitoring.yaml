apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - http:
      paths:
      - pathType: ImplementationSpecific
        path: /prometheus(/|$)(.*)
        backend:
          service:
            name: kube-prometheus-stack-prometheus
            port:
              number: 9090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - http:
      paths:
      - pathType: ImplementationSpecific
        path: /grafana(/|$)(.*)
        backend:
          service:
            name: kube-prometheus-stack-grafana
            port:
              number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:latest
        args:
        - --query.base-path
        - /jaeger
        ports:
        - name: port-5775
          containerPort: 5775
          protocol: UDP
        - name: port-6831
          containerPort: 6831
          protocol: UDP
        - name: port-6832
          containerPort: 6832
          protocol: UDP
        - name: port-5778
          containerPort: 5778
          protocol: TCP
        - name: port-16686
          containerPort: 16686
          protocol: TCP
        - name: port-14268
          containerPort: 14268
          protocol: TCP
        - name: port-14250
          containerPort: 14250
          protocol: TCP
        - name: port-4317
          containerPort: 4317
          protocol: TCP
        - name: port-4318
          containerPort: 4318
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 3
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 3
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
spec:
  selector:
    app: jaeger
  ports:
    - name: port-5775
      protocol: UDP
      port: 5775
      targetPort: 5775
    - name: port-6831
      protocol: UDP
      port: 6831
      targetPort: 6831
    - name: port-6832
      protocol: UDP
      port: 6832
      targetPort: 6832
    - name: port-5778
      protocol: TCP
      port: 5778
      targetPort: 5778
    - name: port-16686
      protocol: TCP
      port: 16686
      targetPort: 16686
    - name: port-14268
      protocol: TCP
      port: 14268
      targetPort: 14268
    - name: port-14250
      protocol: TCP
      port: 14250
      targetPort: 14250
    - name: port-4317
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: port-4318
      protocol: TCP
      port: 4318
      targetPort: 4318
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /jaeger$1$2
spec:
  rules:
  - http:
      paths:
      - pathType: ImplementationSpecific
        path: /jaeger(/|$)(.*)
        backend:
          service:
            name: jaeger
            port:
              number: 16686
