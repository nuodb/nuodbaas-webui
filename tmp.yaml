apiVersion: v1
kind: Service
metadata:
  name: tempo-memberlist
  labels:
    app: tempo
spec:
  clusterIP: None          # headless service for memberlist gossip
  selector:
    app: tempo
  ports:
    - name: gossip
      port: 7946
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  labels:
    app: tempo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.5.0   # adjust version as needed
          args:
            - "-target=all"
            - "-config.file=/etc/tempo/tempo.yaml"
          ports:
            - containerPort: 7946   # gossip
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
      volumes:
        - name: config
          configMap:
            name: tempo-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        jaeger:
          protocols:
            grpc:
    ingester:
      max_block_duration: 5m
    compactor:
      compaction:
        block_retention: 48h
    querier:
      query_frontend:
        max_outstanding_requests: 1000
    storage:
      trace:
        backend: local
        local:
          path: /tmp/tempo/traces
    ring:
      kvstore:
        store: memberlist
        memberlist:
          join_members:
            - tempo-memberlist

