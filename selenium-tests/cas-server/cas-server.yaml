apiVersion: apps/v1
kind: Deployment
metadata:
  name: cas-server
  labels:
    app.kubernetes.io/name: cas-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cas-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cas-server
    spec:
      containers:
      - name: cas-server
        image: cas-server
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: cas-server
spec:
  selector:
    app.kubernetes.io/name: cas-server
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cas-server
  labels:
    app.kubernetes.io/name: cas-server
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /cas-server
            pathType: Prefix
            backend:
              service:
                name: cas-server
                port:
                  number: 8081
